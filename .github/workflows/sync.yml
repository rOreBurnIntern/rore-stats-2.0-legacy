name: Sync rORE Stats

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync prices
        run: |
          curl -X POST https://rore-stats-v2-rebuild.vercel.app/api/sync/prices \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            --silent \
            --show-error

      - name: Sync rounds
        run: |
          curl -X POST https://rore-stats-v2-rebuild.vercel.app/api/sync/rounds \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            --silent \
            --show-error
